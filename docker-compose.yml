version: '3.9'

services:
  appointment-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=hospital_user
      - DB_PASSWORD=hospital_password
      - DB_NAME=hospital_appointment_db
      - API_PREFIX=/api/v1
      - LOG_LEVEL=info
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hospital-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0-alpine
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_USER=hospital_user
      - MYSQL_PASSWORD=hospital_password
      - MYSQL_DATABASE=hospital_appointment_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  hospital-network:
    driver: bridge
